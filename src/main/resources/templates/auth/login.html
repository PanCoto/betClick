<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie | betclick</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/betclick.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="justify-content-center align-items-center auth-page">

    <div class="container fade-in-el">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <h1 class="fw-bold fs-1 brand-title">
                        bet<span class="brand-accent">Click</span>
                    </h1>
                    <p class="text-secondary">Najnowocześniejsze zakłady sportowe online</p>
                </div>

                <div class="glass-panel">
                    <h3 class="fw-bold mb-4 text-center">Logowanie</h3>

                    <div th:if="${loginError}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3" role="alert" th:text="${loginError}"></div>
                    <div th:if="${registrationSuccess}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-3" role="alert" th:text="${registrationSuccess}"></div>
                    <div th:if="${logoutMessage}" class="alert alert-info border-0 bg-info bg-opacity-10 text-info rounded-3" role="alert" th:text="${logoutMessage}"></div>

                    <form th:action="@{/login}" th:object="${loginRequest}" method="POST">
                        <div class="mb-3">
                            <label for="login" class="form-label text-secondary fw-semibold">Login</label>
                            <div class="input-group">
                                <span class="input-group-text bg-secondary border-secondary text-secondary"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control form-control-custom" id="login" th:field="*{login}" placeholder="Wprowadź login" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary fw-semibold">Hasło</label>
                            <div class="input-group">
                                <span class="input-group-text bg-secondary border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control form-control-custom" id="password" th:field="*{password}" placeholder="Wprowadź hasło" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-cyan w-100 py-3 fw-bold rounded-3">
                            Zaloguj się
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-secondary mb-0">Nie masz konta? <a th:href="@{/register}" class="text-cyan fw-bold text-decoration-none">Zarejestruj się</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
