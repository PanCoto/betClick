<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja | betclick</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/betclick.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="justify-content-center align-items-center auth-page">

    <div class="container my-5 fade-in-el">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="text-center mb-4">
                    <h1 class="fw-bold fs-1 brand-title">
                        bet<span class="brand-accent">Click</span>
                    </h1>
                    <p class="text-secondary">Załóż konto i odbierz pakiet startowy</p>
                </div>

                <div class="glass-panel">
                    <h3 class="fw-bold mb-4 text-center">Rejestracja</h3>

                    <div th:if="${registerError}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3" role="alert" th:text="${registerError}"></div>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="login" class="form-label text-secondary fw-semibold">Login *</label>
                                <input type="text" class="form-control form-control-custom" id="login" th:field="*{login}" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('login')}" th:errors="*{login}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label text-secondary fw-semibold">E-mail *</label>
                                <input type="email" class="form-control form-control-custom" id="email" th:field="*{email}" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="firstName" class="form-label text-secondary fw-semibold">Imię *</label>
                                <input type="text" class="form-control form-control-custom" id="firstName" th:field="*{firstName}" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label text-secondary fw-semibold">Nazwisko *</label>
                                <input type="text" class="form-control form-control-custom" id="lastName" th:field="*{lastName}" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="dateOfBirth" class="form-label text-secondary fw-semibold">Data urodzenia *</label>
                                <input type="date" class="form-control form-control-custom" id="dateOfBirth" th:field="*{dateOfBirth}" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="phoneNumber" class="form-label text-secondary fw-semibold">Telefon</label>
                                <input type="text" class="form-control form-control-custom" id="phoneNumber" th:field="*{phoneNumber}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary fw-semibold">Hasło *</label>
                            <input type="password" class="form-control form-control-custom" id="password" th:field="*{password}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <button type="submit" class="btn btn-cyan w-100 py-3 fw-bold rounded-3">
                            Zarejestruj się
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-secondary mb-0">Masz już konto? <a th:href="@{/login}" class="text-cyan fw-bold text-decoration-none">Zaloguj się</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
