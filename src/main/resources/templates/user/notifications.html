<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main}, 'Powiadomienia | betclick')}">
<body>
<main class="fade-in-el">
    <div class="row">
        <div class="col-12">
            <div class="glass-panel">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                    <h4 class="fw-bold mb-0"><i class="bi bi-bell-fill text-cyan me-2"></i> Powiadomienia</h4>
                    <span class="badge bg-danger bg-opacity-20 text-danger"
                          th:if="${profile != null and profile.unreadNotificationsCount != null and profile.unreadNotificationsCount > 0}"
                          th:text="${profile.unreadNotificationsCount + ' nieprzeczytane'}">0 nieprzeczytane</span>
                </div>

                <div th:if="${successMessage}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-3" role="alert" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3" role="alert" th:text="${errorMessage}"></div>

                <div th:if="${notifications.isEmpty()}" class="text-center py-5 text-secondary">
                    <i class="bi bi-bell-slash fs-1 d-block mb-3"></i>
                    Nie masz jeszcze powiadomien.
                </div>

                <div th:unless="${notifications.isEmpty()}" class="d-flex flex-column gap-3">
                    <div th:each="notification : ${notifications}" class="bg-dark bg-opacity-20 border border-secondary rounded p-3">
                        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                            <div>
                                <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                                    <h5 class="fw-bold mb-0" th:text="${notification.title}">Tytul</h5>
                                    <span th:if="${notification.statusCode == 'UNREAD'}" class="badge bg-danger bg-opacity-20 text-danger">UNREAD</span>
                                    <span th:if="${notification.statusCode == 'READ'}" class="badge bg-secondary bg-opacity-30 text-secondary">READ</span>
                                    <span class="badge bg-info bg-opacity-20 text-info" th:text="${notification.typeCode}">TYPE</span>
                                </div>
                                <p class="text-secondary mb-2" th:text="${notification.message}">Tresc powiadomienia</p>
                                <small class="text-secondary"
                                       th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-09 12:00</small>
                            </div>
                            <form th:if="${notification.statusCode == 'UNREAD'}"
                                  th:action="@{/user/notifications/{id}/read(id=${notification.id})}"
                                  method="post">
                                <button type="submit" class="btn btn-sm btn-outline-info">
                                    <i class="bi bi-check2-circle me-1"></i> Oznacz jako przeczytane
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
